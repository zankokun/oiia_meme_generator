<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>body { margin: 0; overflow: hidden; } canvas { display: block; }</style>
</head>
<body>
<script async src="/opencv.js" onload="window._opencvReady = true;"></script>
<script type="importmap">
{
  "imports": {
    "three": "/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const W = 1280, H = 720;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 100);
camera.position.set(0, 1.5, 4);
camera.lookAt(0, 0.8, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(W, H);
renderer.setPixelRatio(1);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dl = new THREE.DirectionalLight(0xffffff, 1.0);
dl.position.set(3, 5, 4);
dl.castShadow = true;
scene.add(dl);
const dl2 = new THREE.DirectionalLight(0xffffff, 0.4);
dl2.position.set(-3, 3, -2);
scene.add(dl2);

const catGroup = new THREE.Group();
scene.add(catGroup);

let catMeshes = [];
let originalTextureData = null;

const loader = new GLTFLoader();
loader.load('/models/cat/scene.gltf', (gltf) => {
  const model = gltf.scene;
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 2.5 / maxDim;
  model.scale.setScalar(scale);
  model.position.sub(center.multiplyScalar(scale));
  model.position.y = -size.y * scale * 0.5 + 0.2;

  model.traverse(child => {
    if (child.isMesh) {
      catMeshes.push(child);
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  catGroup.add(model);

  loadOriginalTexture().then(() => {
    window.sceneReady = true;
  });
}, undefined, (err) => {
  console.error('Model load error:', err);
});

async function loadOriginalTexture() {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      originalTextureData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      resolve();
    };
    img.onerror = () => { resolve(); };
    img.src = '/models/cat/textures/Muchkin2_baseColor.png';
  });
}

function waitForOpencv() {
  return new Promise((resolve) => {
    if (window.cv && window.cv.Mat) { resolve(); return; }
    const check = setInterval(() => {
      if (window.cv && window.cv.Mat) { clearInterval(check); resolve(); }
    }, 100);
    setTimeout(() => { clearInterval(check); resolve(); }, 15000);
  });
}

let catFaceCascade = null;

async function loadHaarCascade() {
  if (catFaceCascade) return catFaceCascade;
  try {
    const resp = await fetch('/haarcascade_frontalcatface.xml');
    const buf = await resp.arrayBuffer();
    cv.FS_createDataFile('/', 'haarcascade_frontalcatface.xml', new Uint8Array(buf), true, false);
    catFaceCascade = new cv.CascadeClassifier();
    catFaceCascade.load('haarcascade_frontalcatface.xml');
    console.log('Haar cascade loaded');
    return catFaceCascade;
  } catch (e) {
    console.warn('Failed to load Haar cascade:', e);
    return null;
  }
}

function sampleBackgroundMedian(src) {
  const w = src.cols, h = src.rows;
  const data = src.data;
  const rArr = [], gArr = [], bArr = [];
  const strip = 10;

  for (let y = 0; y < strip && y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      rArr.push(data[i]); gArr.push(data[i+1]); bArr.push(data[i+2]);
    }
  }
  for (let y = h - strip; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      rArr.push(data[i]); gArr.push(data[i+1]); bArr.push(data[i+2]);
    }
  }
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < strip && x < w; x++) {
      const i = (y * w + x) * 4;
      rArr.push(data[i]); gArr.push(data[i+1]); bArr.push(data[i+2]);
    }
  }
  for (let y = 0; y < h; y++) {
    for (let x = w - strip; x < w; x++) {
      const i = (y * w + x) * 4;
      rArr.push(data[i]); gArr.push(data[i+1]); bArr.push(data[i+2]);
    }
  }

  rArr.sort((a, b) => a - b);
  gArr.sort((a, b) => a - b);
  bArr.sort((a, b) => a - b);
  const mid = Math.floor(rArr.length / 2);
  return [rArr[mid], gArr[mid], bArr[mid]];
}

function removeBackground(imgElement) {
  const src = cv.imread(imgElement);
  const w = src.cols, h = src.rows;

  const blurred = new cv.Mat();
  cv.GaussianBlur(src, blurred, new cv.Size(5, 5), 0);

  const bgMedian = sampleBackgroundMedian(blurred);
  const tol = 50;
  const low = new cv.Mat(h, w, src.type(), [Math.max(0, bgMedian[0] - tol), Math.max(0, bgMedian[1] - tol), Math.max(0, bgMedian[2] - tol), 255]);
  const high = new cv.Mat(h, w, src.type(), [Math.min(255, bgMedian[0] + tol), Math.min(255, bgMedian[1] + tol), Math.min(255, bgMedian[2] + tol), 255]);

  const bgMask = new cv.Mat();
  cv.inRange(blurred, low, high, bgMask);
  blurred.delete(); low.delete(); high.delete();

  const closeKernel = cv.Mat.ones(11, 11, cv.CV_8U);
  cv.morphologyEx(bgMask, bgMask, cv.MORPH_CLOSE, closeKernel);
  closeKernel.delete();

  const openKernel = cv.Mat.ones(5, 5, cv.CV_8U);
  cv.morphologyEx(bgMask, bgMask, cv.MORPH_OPEN, openKernel);
  openKernel.delete();

  const mask = new cv.Mat();
  cv.bitwise_not(bgMask, mask);
  bgMask.delete();

  const dilateKernel = cv.Mat.ones(8, 8, cv.CV_8U);
  cv.dilate(mask, mask, dilateKernel);
  dilateKernel.delete();

  const output = new cv.Mat();
  cv.bitwise_and(src, src, output, mask);

  const resultCanvas = document.createElement('canvas');
  resultCanvas.width = w;
  resultCanvas.height = h;
  cv.imshow(resultCanvas, output);

  const maskCanvas = document.createElement('canvas');
  maskCanvas.width = w;
  maskCanvas.height = h;
  cv.imshow(maskCanvas, mask);

  src.delete(); mask.delete(); output.delete();

  return { canvas: resultCanvas, mask: maskCanvas };
}

function removeBackgroundOld(imgElement) {
  const src = cv.imread(imgElement);
  const w = src.cols, h = src.rows;

  const gray = new cv.Mat();
  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.GaussianBlur(gray, gray, new cv.Size(7, 7), 0);

  const edges = new cv.Mat();
  cv.Canny(gray, edges, 20, 80);
  cv.dilate(edges, edges, cv.Mat.ones(15, 15, cv.CV_8U));

  const contours = new cv.MatVector();
  cv.findContours(edges, contours, new cv.Mat(), cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

  let maxArea = 0;
  let maxIdx = -1;
  for (let i = 0; i < contours.size(); i++) {
    const area = cv.contourArea(contours.get(i));
    if (area > maxArea) { maxArea = area; maxIdx = i; }
  }

  const mask = cv.Mat.zeros(h, w, cv.CV_8UC1);
  if (maxIdx >= 0) {
    const allContours = new cv.MatVector();
    for (let i = 0; i < contours.size(); i++) {
      if (cv.contourArea(contours.get(i)) > maxArea * 0.01) {
        allContours.push_back(contours.get(i));
      }
    }
    cv.drawContours(mask, allContours, -1, new cv.Scalar(255), cv.FILLED);
    allContours.delete();
  }

  const kernel = cv.Mat.ones(30, 30, cv.CV_8U);
  cv.morphologyEx(mask, mask, cv.MORPH_CLOSE, kernel);
  cv.morphologyEx(mask, mask, cv.MORPH_OPEN, cv.Mat.ones(15, 15, cv.CV_8U));
  kernel.delete();

  const output = new cv.Mat();
  cv.bitwise_and(src, src, output, mask);

  const resultCanvas = document.createElement('canvas');
  resultCanvas.width = w;
  resultCanvas.height = h;
  cv.imshow(resultCanvas, output);

  const maskCanvas = document.createElement('canvas');
  maskCanvas.width = w;
  maskCanvas.height = h;
  cv.imshow(maskCanvas, mask);

  src.delete(); gray.delete(); edges.delete();
  contours.delete(); mask.delete(); output.delete();

  return { canvas: resultCanvas, mask: maskCanvas };
}

function detectCatFace(bgRemovedCanvas) {
  if (!catFaceCascade) return null;
  const src = cv.imread(bgRemovedCanvas);
  const gray = new cv.Mat();
  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.equalizeHist(gray, gray);

  const faces = new cv.RectVector();
  catFaceCascade.detectMultiScale(gray, faces, 1.1, 3, 0,
    new cv.Size(50, 50), new cv.Size(300, 300));

  let best = null;
  let maxArea = 0;
  for (let i = 0; i < faces.size(); i++) {
    const f = faces.get(i);
    const area = f.width * f.height;
    if (area > maxArea) {
      maxArea = area;
      best = { x: f.x, y: f.y, w: f.width, h: f.height };
    }
  }

  src.delete(); gray.delete(); faces.delete();

  if (best) {
    console.log(`Haar face detected: ${best.x},${best.y} ${best.w}x${best.h}`);
  } else {
    console.log('No Haar face detected');
  }
  return best;
}

function findCatBoundsFallback(bgCanvas) {
  const ctx = bgCanvas.getContext('2d');
  const { data, width, height } = ctx.getImageData(0, 0, bgCanvas.width, bgCanvas.height);

  let minX = width, maxX = 0, minY = height, maxY = 0;
  let sumX = 0, sumY = 0, count = 0;

  for (let y = 0; y < height; y += 3) {
    for (let x = 0; x < width; x += 3) {
      const i = (y * width + x) * 4;
      const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
      const alpha = data[i+3];
      if (alpha > 200 && brightness > 10) {
        minX = Math.min(minX, x);
        maxX = Math.max(maxX, x);
        minY = Math.min(minY, y);
        maxY = Math.max(maxY, y);
        sumX += x;
        sumY += y;
        count++;
      }
    }
  }

  if (count < 100) return null;

  return {
    x: minX, y: minY,
    w: maxX - minX, h: maxY - minY,
    cx: sumX / count, cy: sumY / count
  };
}

const FACE_UV = { uMin: 0.069, uMax: 0.508, vMin: 0.310, vMax: 0.674 };

function extractBodyPattern(bgRemovedCanvas, face, uw, uh) {
  const bodyCanvas = document.createElement('canvas');
  bodyCanvas.width = uw;
  bodyCanvas.height = uh;
  const bodyCtx = bodyCanvas.getContext('2d');
  bodyCtx.drawImage(bgRemovedCanvas, 0, 0);

  if (face && face.w > 10 && face.h > 10) {
    bodyCtx.save();
    bodyCtx.globalCompositeOperation = 'destination-out';
    const pad = 0.3;
    const fx = Math.max(0, Math.floor(face.x - face.w * pad));
    const fy = Math.max(0, Math.floor(face.y - face.h * pad));
    const fw = Math.floor(face.w * (1 + 2 * pad));
    const fh = Math.floor(face.h * (1 + 2 * pad));
    bodyCtx.beginPath();
    bodyCtx.ellipse(fx + fw / 2, fy + fh / 2, fw / 2, fh / 2, 0, 0, Math.PI * 2);
    bodyCtx.fill();
    bodyCtx.restore();
  }

  return bodyCanvas;
}

function tileBodyPattern(bodyCanvas, tw, th) {
  const srcW = bodyCanvas.width;
  const srcH = bodyCanvas.height;

  const sampleCanvas = document.createElement('canvas');
  const sampleSize = Math.min(srcW, srcH, 400);
  sampleCanvas.width = sampleSize;
  sampleCanvas.height = sampleSize;
  const sCtx = sampleCanvas.getContext('2d');
  const sx = Math.floor((srcW - sampleSize) / 2);
  const sy = Math.floor((srcH - sampleSize) / 2);
  sCtx.drawImage(bodyCanvas, sx, sy, sampleSize, sampleSize, 0, 0, sampleSize, sampleSize);

  const blurred = document.createElement('canvas');
  blurred.width = sampleSize;
  blurred.height = sampleSize;
  const bCtx = blurred.getContext('2d');
  bCtx.filter = 'blur(12px)';
  bCtx.drawImage(sampleCanvas, 0, 0);
  bCtx.filter = 'none';

  const tileCanvas = document.createElement('canvas');
  tileCanvas.width = tw;
  tileCanvas.height = th;
  const tCtx = tileCanvas.getContext('2d');

  const scale = Math.max(tw / sampleSize, th / sampleSize);
  const sw = Math.ceil(tw / scale) + 1;
  const sh = Math.ceil(th / scale) + 1;

  for (let ty = -1; ty < sh; ty++) {
    for (let tx = -1; tx < sw; tx++) {
      tCtx.drawImage(blurred, tx * scale, ty * scale, scale, scale);
    }
  }

  tCtx.drawImage(bodyCanvas, 0, 0, srcW, srcH,
    Math.floor((tw - srcW) / 2), Math.floor((th - srcH) / 2), srcW, srcH);

  return tileCanvas;
}

function sampleBodyColors(originalCanvas, face, count) {
  const ctx = originalCanvas.getContext('2d');
  const { width: w, height: h } = originalCanvas;
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;
  const colors = [];

  if (!face) {
    for (let i = 0; i < count; i++) {
      const x = Math.floor(Math.random() * w);
      const y = Math.floor(Math.random() * h);
      const idx = (y * w + x) * 4;
      colors.push({ r: data[idx], g: data[idx+1], b: data[idx+2] });
    }
    return colors;
  }

  const fcx = face.x + face.w / 2;
  const fcy = face.y + face.h / 2;
  const innerR = Math.max(face.w, face.h) * 0.8;
  const outerR = Math.max(face.w, face.h) * 2.5;

  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = innerR + Math.random() * (outerR - innerR);
    const x = Math.floor(fcx + Math.cos(angle) * dist);
    const y = Math.floor(fcy + Math.sin(angle) * dist);
    if (x >= 0 && x < w && y >= 0 && y < h) {
      const idx = (y * w + x) * 4;
      colors.push({ r: data[idx], g: data[idx+1], b: data[idx+2] });
    }
  }
  return colors;
}

function paintTextureWithSplats(tw, th, colors) {
  const canvas = document.createElement('canvas');
  canvas.width = tw;
  canvas.height = th;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, tw, th);

  const splatRadius = Math.max(tw, th) * 0.12;
  const splatCount = colors.length * 3;

  for (let i = 0; i < splatCount; i++) {
    const c = colors[i % colors.length];
    const variation = 20;
    const r = Math.min(255, Math.max(0, c.r + (Math.random() - 0.5) * variation));
    const g = Math.min(255, Math.max(0, c.g + (Math.random() - 0.5) * variation));
    const b = Math.min(255, Math.max(0, c.b + (Math.random() - 0.5) * variation));

    const x = Math.random() * tw;
    const y = Math.random() * th;
    const radius = splatRadius * (0.5 + Math.random() * 1.0);

    const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
    grad.addColorStop(0, `rgba(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)},0.8)`);
    grad.addColorStop(0.6, `rgba(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)},0.4)`);
    grad.addColorStop(1, `rgba(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)},0)`);

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.filter = 'blur(8px)';
  ctx.drawImage(canvas, 0, 0);
  ctx.filter = 'none';

  return canvas;
}

function createCompositeTexture(userImageData) {
  if (!originalTextureData) return null;

  const ow = originalTextureData.width;
  const oh = originalTextureData.height;
  const uw = userImageData.width;
  const uh = userImageData.height;

  const originalCanvas = document.createElement('canvas');
  originalCanvas.width = uw;
  originalCanvas.height = uh;
  const origCtx = originalCanvas.getContext('2d');
  origCtx.putImageData(userImageData, 0, 0);

  const face = detectCatFace(originalCanvas);
  console.log(`Face: ${face ? `${face.x},${face.y} ${face.w}x${face.h}` : 'none'}`);

  const bodyColors = sampleBodyColors(originalCanvas, face, 24);
  console.log(`Sampled ${bodyColors.length} body colors`);

  const splatTexture = paintTextureWithSplats(ow, oh, bodyColors);

  const canvas = document.createElement('canvas');
  canvas.width = ow;
  canvas.height = oh;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(splatTexture, 0, 0);

  if (face && face.w > 30 && face.h > 30) {
    console.log(`Face: crop + rotate 90° CW + scale to FACE_UV`);

    const faceRegion = {
      x: Math.floor(FACE_UV.uMin * ow),
      y: Math.floor(FACE_UV.vMin * oh),
      w: Math.floor((FACE_UV.uMax - FACE_UV.uMin) * ow),
      h: Math.floor((FACE_UV.vMax - FACE_UV.vMin) * oh)
    };

    const facePad = 0.25;
    const fcx = Math.max(0, Math.floor(face.x - face.w * facePad));
    const fcy = Math.max(0, Math.floor(face.y - face.h * facePad));
    const fcw = Math.min(uw - fcx, Math.floor(face.w * (1 + 2 * facePad)));
    const fch = Math.min(uh - fcy, Math.floor(face.h * (1 + 2 * facePad)));

    const faceCropCanvas = document.createElement('canvas');
    faceCropCanvas.width = fcw;
    faceCropCanvas.height = fch;
    const faceCropCtx = faceCropCanvas.getContext('2d');
    faceCropCtx.drawImage(originalCanvas, fcx, fcy, fcw, fch, 0, 0, fcw, fch);

    const fd = faceCropCtx.getImageData(0, 0, fcw, fch);
    const fp = fd.data;
    const cx = fcw / 2, cy = fch / 2;
    const maxR = Math.max(cx, cy);
    const featherRadius = maxR * 0.65;
    const featherWidth = maxR * 0.35;

    for (let y = 0; y < fch; y++) {
      for (let x = 0; x < fcw; x++) {
        const i = (y * fcw + x) * 4;
        const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
        if (dist > featherRadius) {
          const fade = Math.max(0, 1 - (dist - featherRadius) / featherWidth);
          fp[i+3] = Math.floor(fp[i+3] * fade);
        }
      }
    }
    faceCropCtx.putImageData(fd, 0, 0);

    const rotatedCanvas = document.createElement('canvas');
    rotatedCanvas.width = fch;
    rotatedCanvas.height = fcw;
    const rotCtx = rotatedCanvas.getContext('2d');
    rotCtx.translate(fch / 2, fcw / 2);
    rotCtx.rotate(Math.PI / 2);
    rotCtx.drawImage(faceCropCanvas, -fcw / 2, -fch / 2);

    const rotW = fch;
    const rotH = fcw;

    ctx.save();
    ctx.translate(faceRegion.x + faceRegion.w / 2, faceRegion.y + faceRegion.h / 2);

    const scaleX = faceRegion.w / rotW;
    const scaleY = faceRegion.h / rotH;
    const fitScale = Math.min(scaleX, scaleY);
    ctx.scale(fitScale, fitScale);

    ctx.drawImage(rotatedCanvas, -rotW / 2, -rotH / 2);
    ctx.restore();

    window._debugFaceRegion = faceRegion;
    window._debugFaceDetected = face;
    window._debugFaceAngle = 90;
  } else {
    console.log('No face detected');
  }

  window._debugComposite = canvas.toDataURL('image/png');
  window._debugRegions = { face };

  return canvas;
}

async function applyUserTexture(imageDataUrl) {
  await waitForOpencv();
  await loadHaarCascade();

  const img = new Image();
  img.src = imageDataUrl;
  await new Promise(r => { img.onload = r; });

  const userCanvas = document.createElement('canvas');
  userCanvas.width = img.width;
  userCanvas.height = img.height;
  const userCtx = userCanvas.getContext('2d');
  userCtx.drawImage(img, 0, 0);
  const userImageData = userCtx.getImageData(0, 0, userCanvas.width, userCanvas.height);

  console.log('Creating composite texture...');
  const compositeCanvas = createCompositeTexture(userImageData);

  let texture;
  if (compositeCanvas) {
    texture = new THREE.CanvasTexture(compositeCanvas);
    texture.colorSpace = THREE.SRGBColorSpace;
    console.log('Composite texture applied');
  } else {
    texture = new THREE.TextureLoader().load(imageDataUrl);
    texture.colorSpace = THREE.SRGBColorSpace;
    console.log('Fallback: direct photo');
  }

  if (catMeshes.length === 0) {
    await new Promise(r => setTimeout(r, 500));
  }

  catMeshes.forEach(mesh => {
    mesh.material = mesh.material.clone();
    mesh.material.map = texture;
    mesh.material.needsUpdate = true;
  });
  console.log(`Texture applied to ${catMeshes.length} meshes`);
}

const TOTAL_FRAMES = 450;
const FPS = 30;

function renderFrame(frameIndex) {
  const t = frameIndex / TOTAL_FRAMES;
  const sec = frameIndex / FPS;
  let rotationDelta;
  if (sec < 5.0) {
    rotationDelta = (Math.PI * 2) / (2.0 * FPS);
  } else if (sec < 7.0) {
    const progress = (sec - 5.0) / 2.0;
    rotationDelta = (0.5 * (1.0 - progress * 0.85) * Math.PI * 2) / FPS;
  } else {
    rotationDelta = (20.0 * Math.PI * 2) / FPS;
  }
  catGroup.rotation.y += rotationDelta;
  catGroup.position.y = Math.sin(t * Math.PI * 8) * 0.06;
  renderer.render(scene, camera);
}

window.setCatTexture = applyUserTexture;
window.renderFrame = renderFrame;

</script>
</body>
</html>
